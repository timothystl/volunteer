name = "tlc-chms"
main = "tlc-volunteer-worker.js"
compatibility_date = "2024-01-01"

[vars]
EMAIL_FROM     = "TLC Gather <noreply@notify.timothystl.org>"
REPLY_TO_EMAIL = "dinger@timothystl.org"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[[routes]]
pattern = "volunteer.timothystl.org/*"
zone_name = "timothystl.org"
custom_domain = false

[[routes]]
pattern = "chms.timothystl.org"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "tlc-volunteer-db"
database_id = "9399ee53-3386-4084-9b6b-def46b88f96a"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RSVP_STORE"
id = "3db4fdc395084ae0a9e8295c460ba08e"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "tlc-chms-photos"

[triggers]
crons = ["0 14 * * *"]
